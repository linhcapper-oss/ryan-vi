        // ==========================================
        // 2. FLASHCARD MODE
        // ==========================================
        function FlashcardMode({ words }) {
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFlipped, setIsFlipped] = useState(false);

            useEffect(() => {
                setCurrentIndex(0);
                setIsFlipped(false);
            }, [words]);

            if (words.length === 0) return null;

            const currentWord = words[currentIndex];

            const handleNext = () => {
                setIsFlipped(false);
                setTimeout(() => setCurrentIndex((prev) => (prev + 1) % words.length), 150);
            };

            const handlePrev = () => {
                setIsFlipped(false);
                setTimeout(() => setCurrentIndex((prev) => (prev - 1 + words.length) % words.length), 150);
            };

            const handleShuffle = () => {
                setIsFlipped(false);
                setTimeout(() => {
                    const randomIdx = Math.floor(Math.random() * words.length);
                    setCurrentIndex(randomIdx);
                }, 150);
            };

            return (
                <div className="flex flex-col items-center">
                    <p className="text-gray-500 mb-4 font-medium">Card {currentIndex + 1} / {words.length}</p>
                    
                    <div 
                        className="w-full max-w-lg h-64 md:h-80 perspective-1000 cursor-pointer"
                        onClick={() => setIsFlipped(!isFlipped)}
                    >
                        <div className={`relative w-full h-full transition-transform duration-500 transform-style-3d ${isFlipped ? 'rotate-y-180' : ''}`}>
                            <div className="absolute w-full h-full backface-hidden bg-white border-2 border-indigo-100 rounded-3xl shadow-lg flex flex-col items-center justify-center p-6 md:p-8 text-center">
                                <span className="text-xs md:text-sm font-semibold text-indigo-400 mb-2 md:mb-4 uppercase tracking-wider">{currentWord.topic}</span>
                                <h2 className="text-3xl md:text-5xl font-bold text-gray-800 mb-2 md:mb-4">{currentWord.en}</h2>
                                <p className="text-base md:text-lg font-mono text-gray-500">{currentWord.ipa}</p>
                                <p className="absolute bottom-4 md:bottom-6 text-xs md:text-sm text-gray-400 animate-pulse">Click to flip</p>
                            </div>

                            <div className="absolute w-full h-full backface-hidden bg-indigo-600 rounded-3xl shadow-lg flex flex-col items-center justify-center p-6 md:p-8 text-center rotate-y-180">
                                <h2 className="text-2xl md:text-4xl font-bold text-white mb-2 leading-tight">{currentWord.vn}</h2>
                                <p className="text-indigo-200 text-base md:text-lg">({currentWord.type})</p>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-wrap items-center justify-center gap-4 mt-6 md:mt-8">
                        <button onClick={handlePrev} className="p-3 bg-white rounded-full shadow hover:bg-gray-50 text-gray-600">
                            <ChevronLeft className="w-5 h-5 md:w-6 md:h-6" />
                        </button>
                        <button onClick={handleShuffle} className="p-3 bg-white rounded-full shadow hover:bg-gray-50 text-indigo-600 flex items-center px-4 md:px-6">
                            <Shuffle className="w-4 h-4 md:w-5 md:h-5 mr-2" />
                            <span className="font-medium text-sm md:text-base">Shuffle</span>
                        </button>
                        <button onClick={handleNext} className="p-3 bg-white rounded-full shadow hover:bg-gray-50 text-gray-600">
                            <ChevronRight className="w-5 h-5 md:w-6 md:h-6" />
                        </button>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 3. QUIZ MODE
        // ==========================================
        function QuizMode({ words }) {
            const [question, setQuestion] = useState(null);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [score, setScore] = useState({ correct: 0, total: 0 });

            const generateQuestion = () => {
                setSelectedAnswer(null);
                const correctIdx = Math.floor(Math.random() * words.length);
                const correctWord = words[correctIdx];

                let options = [correctWord];
                while (options.length < 4) {
                    const randomWord = words[Math.floor(Math.random() * words.length)];
                    if (!options.find(opt => opt.en === randomWord.en)) {
                        options.push(randomWord);
                    }
                }
                options = options.sort(() => Math.random() - 0.5);

                setQuestion({
                    target: correctWord,
                    options: options,
                    questionType: Math.random() > 0.5 ? 'en-to-vn' : 'vn-to-en'
                });
            };

            useEffect(() => { generateQuestion(); }, []);

            if (!question) return null;

            const handleAnswer = (option) => {
                if (selectedAnswer) return;
                const isCorrect = option.en === question.target.en;
                setSelectedAnswer({ option, isCorrect });
                setScore(prev => ({ correct: prev.correct + (isCorrect ? 1 : 0), total: prev.total + 1 }));
            };

            const isEnToVn = question.questionType === 'en-to-vn';
            
            return (
                <div className="max-w-2xl mx-auto bg-white p-5 md:p-8 rounded-3xl shadow-sm border border-gray-100">
                    <div className="flex justify-between items-center mb-6 md:mb-8 pb-4 border-b border-gray-100">
                        <h2 className="text-lg md:text-xl font-bold text-gray-800">Quiz Practice</h2>
                        <div className="bg-indigo-50 px-3 py-1.5 md:px-4 md:py-2 rounded-lg font-semibold text-indigo-700 text-sm md:text-base">
                            Score: {score.correct} / {score.total}
                        </div>
                    </div>

                    <div className="text-center mb-6 md:mb-8">
                        <p className="text-gray-500 mb-2 uppercase text-xs md:text-sm font-semibold tracking-wider">{question.target.topic}</p>
                        <h3 className="text-lg md:text-2xl text-gray-800 leading-relaxed">
                            {isEnToVn ? 
                                <span>What is the meaning of <strong className="text-xl md:text-2xl text-indigo-700">{question.target.en}</strong>?</span> : 
                                <span>Which word means <strong className="text-xl md:text-2xl text-emerald-700">{question.target.vn}</strong>?</span>
                            }
                        </h3>
                    </div>

                    <div className="space-y-3 mb-6 md:mb-8">
                        {question.options.map((option, idx) => {
                            let btnClass = "w-full text-left p-3 md:p-4 rounded-xl border-2 transition-all font-medium text-base md:text-lg flex justify-between items-center ";
                            let icon = null;

                            if (!selectedAnswer) {
                                btnClass += "border-gray-200 text-gray-700 hover:border-indigo-400 hover:bg-indigo-50";
                            } else {
                                const isCorrect = option.en === question.target.en;
                                const isSelected = selectedAnswer.option.en === option.en;

                                if (isCorrect) {
                                    btnClass += "border-emerald-500 bg-emerald-50 text-emerald-700";
                                    icon = <CheckCircle2 className="w-5 h-5 md:w-6 md:h-6 text-emerald-500" />;
                                } else if (isSelected && !selectedAnswer.isCorrect) {
                                    btnClass += "border-red-400 bg-red-50 text-red-700";
                                    icon = <XCircle className="w-5 h-5 md:w-6 md:h-6 text-red-500" />;
                                } else {
                                    btnClass += "border-gray-200 text-gray-400 opacity-50";
                                }
                            }

                            return (
                                <button key={idx} disabled={!!selectedAnswer} onClick={() => handleAnswer(option)} className={btnClass}>
                                    <span>{isEnToVn ? option.vn : option.en}</span>
                                    {icon}
                                </button>
                            );
                        })}
                    </div>

                    {selectedAnswer && (
                        <div className="text-center">
                            <button onClick={generateQuestion} className="inline-flex items-center px-6 py-2.5 md:px-8 md:py-3 bg-indigo-600 text-white rounded-full font-bold shadow hover:bg-indigo-700 transition-colors text-sm md:text-base">
                                <span>Next Question</span>
                                <ChevronRight className="w-4 h-4 md:w-5 md:h-5 ml-2" />
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // MAIN APP
        // ==========================================
        function App() {
            const [activeTab, setActiveTab] = useState('study');
            const [selectedTopic, setSelectedTopic] = useState('All Topics');

            const filteredWords = useMemo(() => {
                return selectedTopic === 'All Topics' 
                    ? VOCAB_DATA 
                    : VOCAB_DATA.filter(w => w.topic === selectedTopic);
            }, [selectedTopic]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-4xl mx-auto">
                        <header className="text-center mb-6 md:mb-8">
                            <h1 className="text-2xl md:text-4xl font-bold text-indigo-700 mb-2">IELTS Vocabulary for Band 6.0</h1>
                            <p className="text-sm md:text-base text-gray-500">Master the 15 most important topics</p>
                        </header>

                        <div className="flex flex-wrap justify-center gap-2 md:gap-4 mb-6 md:mb-8">
                            <button onClick={() => setActiveTab('study')} className={`flex items-center px-3 py-2 md:px-4 md:py-2 rounded-full font-medium text-sm md:text-base transition-colors ${activeTab === 'study' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-indigo-50 border border-gray-200'}`}>
                                <BookOpen className="w-4 h-4 md:w-5 md:h-5 mr-2" /> <span>Study List</span>
                            </button>
                            <button onClick={() => setActiveTab('flashcard')} className={`flex items-center px-3 py-2 md:px-4 md:py-2 rounded-full font-medium text-sm md:text-base transition-colors ${activeTab === 'flashcard' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-indigo-50 border border-gray-200'}`}>
                                <Layers className="w-4 h-4 md:w-5 md:h-5 mr-2" /> <span>Flashcards</span>
                            </button>
                            <button onClick={() => setActiveTab('quiz')} className={`flex items-center px-3 py-2 md:px-4 md:py-2 rounded-full font-medium text-sm md:text-base transition-colors ${activeTab === 'quiz' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-gray-600 hover:bg-indigo-50 border border-gray-200'}`}>
                                <HelpCircle className="w-4 h-4 md:w-5 md:h-5 mr-2" /> <span>Quiz</span>
                            </button>
                        </div>

                        {activeTab !== 'quiz' && (
                            <div className="mb-6 flex flex-wrap gap-2 justify-center">
                                {TOPICS.map(topic => (
                                    <button
                                        key={topic}
                                        onClick={() => setSelectedTopic(topic)}
                                        className={`px-3 py-1 text-xs md:text-sm rounded-full border transition-colors ${selectedTopic === topic ? 'bg-indigo-100 text-indigo-800 border-indigo-300' : 'bg-white text-gray-500 border-gray-200 hover:bg-gray-100'}`}
                                    >
                                        {topic}
                                    </button>
                                ))}
                            </div>
                        )}

                        {activeTab === 'study' && <StudyMode words={filteredWords} />}
                        {activeTab === 'flashcard' && <FlashcardMode words={filteredWords} />}
                        {activeTab === 'quiz' && <QuizMode words={VOCAB_DATA} />}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
